services:
  - type: web
    name: cropsense-ai
    plan: free
    env: python
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && pip install --no-cache-dir -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GEMINI_API_KEY
        sync: false
